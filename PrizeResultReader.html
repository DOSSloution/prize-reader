<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>نتيجة الجائزة</title>
  <style>
    :root { color-scheme: light; font-family: "Segoe UI", Tahoma, Arial, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: #f4f6fa; color: #172033; }
    .card { width: min(100%, 520px); border-radius: 24px; overflow: hidden; background: #fff; box-shadow: 0 16px 48px rgba(23, 32, 51, .14); text-align: center; }
    .banner { padding: 28px 24px 24px; background: #244f7b; color: #fff; }
    .banner.win { background: linear-gradient(135deg, #b47b08, #e7b63a); }
    .banner.no-win { background: #5d6978; }
    .icon { width: 70px; height: 70px; margin: 0 auto 14px; display: grid; place-items: center; border-radius: 50%; background: rgba(255,255,255,.2); font-size: 38px; }
    h1 { margin: 0; font-size: 27px; }
    .campaign { margin: 8px 0 0; opacity: .92; font-size: 16px; }
    .body { padding: 28px 24px 30px; }
    .message { margin: 0; line-height: 1.8; font-size: 18px; }
    .details { margin: 22px 0 0; padding: 18px; border-radius: 16px; background: #f7f9fc; text-align: right; }
    .details p { margin: 8px 0; line-height: 1.6; }
    .label { color: #637084; font-size: 14px; }
    .value { font-weight: 700; }
    .code { margin: 22px 0 0; padding: 17px; border: 2px dashed #c49016; border-radius: 16px; background: #fffaf0; direction: ltr; font-size: 27px; font-weight: 800; letter-spacing: 2px; }
    button { margin-top: 12px; border: 0; border-radius: 10px; padding: 11px 18px; cursor: pointer; background: #244f7b; color: #fff; font: inherit; font-weight: 700; }
    .footnote { margin: 22px 0 0; color: #637084; font-size: 13px; line-height: 1.7; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <main class="card" aria-live="polite">
    <header id="banner" class="banner">
      <div id="icon" class="icon">⌛</div>
      <h1 id="title">جاري قراءة النتيجة</h1>
      <p id="campaign" class="campaign"></p>
    </header>
    <section class="body">
      <p id="message" class="message"></p>
      <div id="details" class="details hidden"></div>
      <div id="code" class="code hidden"></div>
      <button id="copyCode" class="hidden" type="button">نسخ رمز الاستبدال</button>
      <p id="footnote" class="footnote"></p>
    </section>
  </main>

  <script>
    (function () {
      var banner = document.getElementById("banner");
      var icon = document.getElementById("icon");
      var title = document.getElementById("title");
      var campaign = document.getElementById("campaign");
      var message = document.getElementById("message");
      var details = document.getElementById("details");
      var code = document.getElementById("code");
      var copyCode = document.getElementById("copyCode");
      var footnote = document.getElementById("footnote");

      function decodePayload(value) {
        var base64 = value.replace(/-/g, "+").replace(/_/g, "/");
        while (base64.length % 4) base64 += "=";
        var binary = atob(base64);
        var bytes = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        var json = window.TextDecoder
          ? new TextDecoder("utf-8").decode(bytes)
          : decodeURIComponent(Array.prototype.map.call(bytes, function (byte) {
              return "%" + ("00" + byte.toString(16)).slice(-2);
            }).join(""));
        return JSON.parse(json);
      }

      function setInvalidResult() {
        banner.className = "banner no-win";
        icon.textContent = "!";
        title.textContent = "رمز QR غير صالح";
        message.textContent = "تعذر قراءة بيانات النتيجة من رمز QR هذا.";
        footnote.textContent = "يرجى الرجوع إلى المطعم إذا كنت تحتاج إلى مساعدة.";
      }

      function addDetail(label, value) {
        if (!value) return;
        var line = document.createElement("p");
        var labelElement = document.createElement("span");
        var valueElement = document.createElement("span");
        labelElement.className = "label";
        labelElement.textContent = label + ": ";
        valueElement.className = "value";
        valueElement.textContent = value;
        line.appendChild(labelElement);
        line.appendChild(valueElement);
        details.appendChild(line);
      }

      try {
        var params = new URLSearchParams(location.hash.slice(1));
        var data = decodePayload(params.get("p") || "");
        if (data.v !== 1) throw new Error("Unsupported prize payload.");

        campaign.textContent = data.n || "حملة الجوائز";
        if (!data.e) {
          banner.className = "banner no-win";
          icon.textContent = "i";
          title.textContent = "هذه الفاتورة غير مؤهلة";
          message.textContent = "شكرًا لزيارتك. هذه الفاتورة لا تحقق شروط الدخول في الحملة.";
          footnote.textContent = "ننتظرك في فرصة قادمة.";
          return;
        }

        if (!data.w) {
          banner.className = "banner no-win";
          icon.textContent = "★";
          title.textContent = "لم تربح هذه المرة";
          message.textContent = "شكرًا لمشاركتك. احتفظ بإيصالاتك وجرب حظك في الزيارة القادمة.";
          footnote.textContent = "نتمنى لك حظًا أوفر قريبًا.";
          return;
        }

        banner.className = "banner win";
        icon.textContent = "★";
        title.textContent = "مبروك، لقد ربحت!";
        message.textContent = "التقط لقطة شاشة لهذه الصفحة واعرض الرمز عند الكاشير مع طلب جديد.";

        var prizeType = data.t === "f" ? "عنصر مجاني" : "خصم";
        addDetail("الجائزة", data.d || prizeType);
        if (data.t === "d" && data.a !== undefined) {
          addDetail("قيمة الخصم", data.m === "p" ? data.a + "%" : data.a);
        }
        addDetail("صالح حتى", data.x || "");
        details.classList.remove("hidden");

        code.textContent = data.c || "";
        code.classList.remove("hidden");
        copyCode.classList.remove("hidden");
        footnote.textContent = "الرمز صالح للاستبدال مرة واحدة فقط.";

        copyCode.addEventListener("click", function () {
          var value = data.c || "";
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(value);
          } else {
            var input = document.createElement("textarea");
            input.value = value;
            document.body.appendChild(input);
            input.select();
            document.execCommand("copy");
            input.remove();
          }
          copyCode.textContent = "تم نسخ الرمز";
        });
      } catch (error) {
        setInvalidResult();
      }
    }());
  </script>
</body>
</html>
